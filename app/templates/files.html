{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

<div class="image-grid">
    {% if images %}
        {% for image in images %}
        <div class="image-card">
            <div class="image-container">
                <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
            </div>
            <div class="image-footer">
                <span class="image-name">{{ image }}</span>
                <!-- Optional trash icon (not required for lab) -->
                <!-- <a href="#" class="delete-icon">🗑️</a> -->
            </div>
        </div>
        {% endfor %}
    {% else %}
        <p class="no-images">No images uploaded yet.</p>
    {% endif %}
</div>

<style>
    .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 25px;
        padding: 30px 0;
    }
    
    .image-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        background-color: #fff;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .image-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .image-container {
        width: 100%;
        height: 200px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f5f5f5;
        border-bottom: 1px solid #eee;
    }
    
    .image-container img {
        max-width: 100%;
        max-height: 100%;
        object-fit: cover;
    }
    
    .image-footer {
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #fafafa;
    }
    
    .image-name {
        font-size: 0.9rem;
        color: #333;
        word-break: break-all;
        flex: 1;
    }
    
    .delete-icon {
        color: #dc3545;
        text-decoration: none;
        font-size: 1.2rem;
        margin-left: 10px;
        opacity: 0.6;
        transition: opacity 0.2s ease;
    }
    
    .delete-icon:hover {
        opacity: 1;
        color: #dc3545;
    }
    
    .no-images {
        text-align: center;
        font-size: 1.2rem;
        color: #666;
        padding: 50px;
        width: 100%;
        background-color: #f9f9f9;
        border-radius: 8px;
    }
</style>
{% endblock %}
